projects:
  - title: "CatPred"
    badge: "NAT. COMM."
    category: "ML Tool Development / Enzyme Kinetics"
    description: "Deep learning framework utilizing protein language models and probabilistic learning to boost enzyme turnover prediction accuracy by 40%. Provides a comprehensive platform for predicting in vitro enzyme kinetic parameters including k<sub>cat</sub>, K<sub>M</sub>, and k<sub>cat</sub>/K<sub>M</sub>."
    meta: "Published in Nature Communications, 2025 &middot; 80 Citations"
    has_divider: true

  - title: "SARS-CoV-2 Binding Prediction"
    badge: "PNAS"
    category: "Computational Biology"
    description: "Biophysics-driven ML model for predicting effects of mutations on Spike-hACE2 binding affinity. Developed a high-throughput MD simulation pipeline, dissecting 2 TB of molecular dynamics data to map the mutational landscape of the receptor binding domain."
    meta: "Published in PNAS, 2021 &middot; 101 Citations"
    has_divider: true

  - title: "Antibody Design (SARS-CoV-2)"
    badge: "PROTEINS"
    category: "Antibody & Protein Engineering"
    description: "High-impact antibody library targeting SARS-CoV-2 Spike using VDJ recombination algorithm and Rosetta-driven affinity maturation, boosting binding efficiency by 50%. De novo design and assessment of high-affinity antibody variable regions (Fv) against the Spike RBD."
    meta: "Published in Proteins, 2023 &middot; 15 Citations"
    has_divider: true

  - title: "Enzrank / Enzyme Redesign"
    badge: "METAB. ENG."
    category: "ML Tool Development"
    description: "Deep learning tool for selection and re-design of enzymes for novel substrates by integrating unsupervised and supervised learning. Rank-orders known enzymes as starting points for re-engineering novel substrate activity using a convolutional neural network."
    meta: "Published in Metabolic Engineering, 2023 &middot; 26 Citations"
    has_divider: true

  - title: "IPRO+/-"
    badge: "STRUCTURE"
    category: "Protein Design Tool"
    description: "Optimization-based protein design tool to incorporate insertions and deletions into protein sequences. Developed \"Indel-Maker\" for modeling insertions and deletions using PyRosetta, extending the design space beyond point mutations."
    meta: "Published in Structure, 2020 &middot; 15 Citations"
    has_divider: true

  - title: "Membrane Protein for CWA Binding"
    badge: "AICHE"
    category: "Protein Engineering"
    description: "Engineered a membrane protein with precise binding to chemical warfare agents using a custom design pipeline in Rosetta. Structure-based computational design targeting selective molecular recognition."
    meta: "Presented at AIChE Annual Meeting, 2023"
    has_divider: true

  - title: "De Novo Cellulase Design"
    badge: "IN PROGRESS"
    category: "De Novo Protein Design"
    description: "De novo cellulase library designed using RFDiffusion-AllAtom and LigandMPNN, achieving a 30% reduction in protein size. Currently undergoing MD validation for structural stability and catalytic competence."
    meta: "In progress"
    has_divider: false

